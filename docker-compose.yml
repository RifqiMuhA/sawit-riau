# x-airflow-common: konfigurasi dasar untuk service Airflow
x-airflow-common: &airflow-common
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_USER}:${AIRFLOW_PASSWORD}@postgres/${AIRFLOW_DB}
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY}"
    AIRFLOW__WEBSERVER__SECRET_KEY: "${AIRFLOW_SECRET_KEY}"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # Koneksi Database
    AIRFLOW_CONN_POSTGIS_DWH: postgresql://${DWH_USER}:${DWH_PASSWORD}@postgis:5432/${DWH_DB}
    AIRFLOW_CONN_MYSQL_OLTP: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql_oltp:3306/
    AIRFLOW_CONN_POSTGRES_OLTP: postgresql://${OLTP_PG_USER}:${OLTP_PG_PASSWORD}@postgres_oltp:5432/${OLTP_PG_DB}
    _PIP_ADDITIONAL_REQUIREMENTS: ""
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data-perusahaan:/opt/airflow/data-perusahaan:ro
    - ./data-pdf:/opt/airflow/data-pdf
    - ./gee-credentials.json:/home/airflow/.config/earthengine/credentials:ro
  depends_on:
    postgres:
      condition: service_healthy
    postgis:
      condition: service_healthy

services:
  # Metadata DB untuk Airflow
  postgres:
    image: postgres:14
    container_name: airflow_postgres
    environment:
      POSTGRES_USER: ${AIRFLOW_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB}
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Data Warehouse PostGIS
  postgis:
    image: postgis/postgis:14-3.3
    container_name: postgis_db
    environment:
      POSTGRES_USER: ${DWH_USER}
      POSTGRES_PASSWORD: ${DWH_PASSWORD}
      POSTGRES_DB: ${DWH_DB}
    ports:
      - "5437:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./init-sql/postgis/:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DWH_USER}", "-d", "${DWH_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Inisialisasi Database Airflow
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    restart: on-failure
    entrypoint:
      - /bin/bash
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname admin \
          --lastname admin \
          --role Admin \
          --email admin@example.com

  # Airflow Web UI
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_web
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      postgis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    command: webserver
    shm_size: '256m'

  # Selenium Chrome untuk scraping PDF
  selenium-chrome:
    image: selenium/standalone-chrome:latest
    container_name: selenium_chrome
    shm_size: '2g'
    ports:
      - "4444:4444"
    environment:
      - SE_NODE_MAX_SESSIONS=1
      - SE_VNC_NO_PASSWORD=1
    volumes:
      - ./data-pdf:/home/seluser/downloads:rw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Airflow Scheduler
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      postgis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      selenium-chrome:
        condition: service_healthy
    command: scheduler
    shm_size: '256m'

  # MySQL OLTP (Simulasi DB Perusahaan A & B)
  mysql-oltp:
    image: mysql:8.0
    container_name: mysql_oltp
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-sql/mysql/:/docker-entrypoint-initdb.d/
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # PostgreSQL OLTP (Simulasi DB Perusahaan C & D)
  postgres-oltp:
    image: postgres:14
    container_name: postgres_oltp
    environment:
      POSTGRES_USER: ${OLTP_PG_USER}
      POSTGRES_PASSWORD: ${OLTP_PG_PASSWORD}
      POSTGRES_DB: ${OLTP_PG_DB}
    ports:
      - "5438:5432"
    volumes:
      - postgres_oltp_data:/var/lib/postgresql/data
      - ./init-sql/postgres/:/docker-entrypoint-initdb.d/
    healthcheck:
      test:
        ["CMD", "pg_isready", "-U", "${OLTP_PG_USER}", "-d", "${OLTP_PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # MinIO untuk backup DWH
  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9090:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # MongoDB untuk log alert operasional
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: sawit_alerts
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./data-perusahaan:/data-perusahaan:ro
      - ./init-sql/mongodb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # pgAdmin GUI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgis:
        condition: service_healthy

  # SAVI Dashboard (Plotly Dash)
  dash_app:
    build: ./dashboard
    container_name: dash_app
    ports:
      - "8050:8050"
    environment:
      DWH_HOST: postgis
      DWH_PORT: "5432"
      DWH_USER: ${DWH_USER}
      DWH_PASSWORD: ${DWH_PASSWORD}
      DWH_DB: ${DWH_DB}
    depends_on:
      postgis:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  postgis_data:
  postgres_oltp_data:
  mysql_data:
  mongo_data:
  minio_data:
  pgadmin_data:
