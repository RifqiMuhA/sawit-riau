# ─────────────────────────────────────────────────────────────
#  ANCHOR: konfigurasi bersama semua service Airflow
#  Gunakan &airflow-common agar tidak duplikasi env di tiap service
# ─────────────────────────────────────────────────────────────
x-airflow-common: &airflow-common
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_USER}:${AIRFLOW_PASSWORD}@postgres/${AIRFLOW_DB}
    # WAJIB di Airflow 2.x — generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY}"
    AIRFLOW__WEBSERVER__SECRET_KEY: "${AIRFLOW_SECRET_KEY}"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # ── Koneksi Database Otomatis ──
    AIRFLOW_CONN_POSTGIS_DWH: postgresql://${DWH_USER}:${DWH_PASSWORD}@postgis:5432/${DWH_DB}
    AIRFLOW_CONN_MYSQL_OLTP: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql_oltp:3306/
    AIRFLOW_CONN_POSTGRES_OLTP: postgresql://${OLTP_PG_USER}:${OLTP_PG_PASSWORD}@postgres_oltp:5432/${OLTP_PG_DB}
    # ── Semua provider & library dipindah ke requirements.txt ──
    _PIP_ADDITIONAL_REQUIREMENTS: ""
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data-perusahaan:/opt/airflow/data-perusahaan:ro # Data dummy SQL + Excel + MongoDB JSON
    - ./data-pdf:/opt/airflow/data-pdf # PDF Disbun Riau — DAG 3 (rw: bisa download otomatis)
    - ./gee-credentials.json:/home/airflow/.config/earthengine/credentials:ro # GEE auth
  depends_on:
    postgres:
      condition: service_healthy # tunggu metadata DB siap
    postgis:
      condition: service_healthy # tunggu DWH siap sebelum DAG apapun jalan

services:
  # ── 1. PostgreSQL — metadata database Airflow ───────────────
  postgres:
    image: postgres:14
    container_name: airflow_postgres
    environment:
      POSTGRES_USER: ${AIRFLOW_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB}
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── 2. PostGIS — Data Warehouse spasial ────────────────────
  #    Berisi semua dim & fact table: dim_kabupaten, dim_perusahaan,
  #    fact_ndvi, fact_produksi, fact_operasional, fact_harga_cpo
  postgis:
    image: postgis/postgis:14-3.3
    container_name: postgis_db
    environment:
      POSTGRES_USER: ${DWH_USER}
      POSTGRES_PASSWORD: ${DWH_PASSWORD}
      POSTGRES_DB: ${DWH_DB}
    ports:
      - "5437:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./init-sql/postgis/:/docker-entrypoint-initdb.d/ # DDL DWH: dim, fact tables + seed data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DWH_USER}", "-d", "${DWH_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── 3. Airflow Init — inisialisasi DB & buat user admin ────
  #    Harus SELESAI dulu sebelum webserver & scheduler start
  #    db migrate (bukan db init) — sesuai Airflow 2.7+
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    restart: on-failure # stop setelah sukses, retry kalau gagal
    # CATATAN: gunakan list + | agar newline nyata dipertahankan
    # sehingga \ di akhir baris berfungsi sebagai line-continuation bash.
    # Jangan pakai scalar > karena ia melipat newline → spasi dan membuat
    # '\\' + spasi menjadi satu kata tunggal (penyebab exit 127).
    entrypoint:
      - /bin/bash
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname admin \
          --lastname admin \
          --role Admin \
          --email admin@example.com

  # ── 4. Airflow Webserver — UI di port 8080 ─────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_web
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      postgis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully # tunggu init selesai
    ports:
      - "8080:8080"
    command: webserver
    shm_size: '256m'        # Chromium butuh shared memory (DAG 3 Selenium)

  # ── 5b. Selenium Standalone Chrome — untuk DAG 3 (scraping PDF Disbun) ──
  selenium-chrome:
    image: selenium/standalone-chrome:latest
    container_name: selenium_chrome
    shm_size: '2g'              # Chrome butuh shared memory besar
    ports:
      - "4444:4444"             # WebDriver endpoint (bisa dibuka di browser: /ui)
    environment:
      - SE_NODE_MAX_SESSIONS=1
      - SE_VNC_NO_PASSWORD=1
    volumes:
      - ./data-pdf:/home/seluser/downloads:rw   # Share download directory with Airflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── 5. Airflow Scheduler — orkestrasi DAG ETL ──────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      postgis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully # tunggu init selesai
      selenium-chrome:
        condition: service_healthy               # tunggu Chrome siap
    command: scheduler
    shm_size: '256m'

  # ── 6. MySQL OLTP — simulasi DB operasional Perusahaan A & B ──
  #    Perusahaan A (a-01-kampar s/d a-03-siak): tabel perusahaan, karyawan,
  #                varietas, kebun, laporan_bulanan, jadwal_panen
  #    Perusahaan B (b-04-indragiri-hulu s/d b-06-indragiri-hilir): tabel
  #                perusahaan_b, pegawai, varietas, blok_kebun, rekap_bulanan, rencana_panen
  #    Data diisi dari data-perusahaan/SQL_PKS-A-*.sql dan SQL_PKS-B-*.sql
  mysql-oltp:
    image: mysql:8.0
    container_name: mysql_oltp
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-sql/mysql/:/docker-entrypoint-initdb.d/ # buat db_perusahaan_a & db_perusahaan_b
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── 7. PostgreSQL OLTP — simulasi DB operasional Perusahaan C & D ──
  #    BERBEDA dari 'postgres' (metadata Airflow) & 'postgis' (DWH)
  #    Perusahaan C: db_perusahaan_c → tabel perusahaan, karyawan, laporan
  #    Perusahaan D: db_perusahaan_d → tabel data_perusahaan, data_karyawan, produksi_bulanan
  #    Data diisi dari data-perusahaan/SQL_PKS-C-*.sql dan SQL_PKS-D-*.sql
  postgres-oltp:
    image: postgres:14
    container_name: postgres_oltp
    environment:
      POSTGRES_USER: ${OLTP_PG_USER}
      POSTGRES_PASSWORD: ${OLTP_PG_PASSWORD}
      POSTGRES_DB: ${OLTP_PG_DB}
    ports:
      - "5438:5432"
    volumes:
      - postgres_oltp_data:/var/lib/postgresql/data
      - ./init-sql/postgres/:/docker-entrypoint-initdb.d/ # buat db_perusahaan_c & db_perusahaan_d
    healthcheck:
      test:
        ["CMD", "pg_isready", "-U", "${OLTP_PG_USER}", "-d", "${OLTP_PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── 8. MinIO — backup snapshot DWH mingguan ─────────────────
  #    TIDAK ada raw layer di MinIO — sesuai arsitektur brief.
  #    MinIO hanya dipakai DAG 5 untuk backup periodik snapshot PostGIS DWH.
  #    Semua sumber data langsung diproses Airflow → DWH (tanpa staging S3).
  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000" # S3 API endpoint
      - "9090:9001" # MinIO Console UI (Host Port 9090 -> Container Port 9001)
    volumes:
      - minio_data:/data # backup snapshot DWH — agar tidak hilang saat restart
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── 9. MongoDB — log alert operasional harian per perusahaan PKS ──
  #    Collection: log_alert_harian di database sawit_alerts
  #    Data diinisialisasi dari data-perusahaan/MongoDB_Alerts_PKS-*.json
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: sawit_alerts
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./data-perusahaan:/data-perusahaan:ro # JSON alert per perusahaan
      - ./init-sql/mongodb:/docker-entrypoint-initdb.d:ro # script import JSON
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── 10. pgAdmin — GUI lengkap untuk PostGIS DWH (spatial support) ──
  #     Akses: http://localhost:5050
  #     Login: ${PGADMIN_EMAIL} / ${PGADMIN_PASSWORD}
  #     Tambah server: host=postgis_db, port=5432, db=sawit_dwh, user=dwh
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgis:
        condition: service_healthy

volumes:
  postgres_data:
  postgis_data:
  postgres_oltp_data:
  mysql_data:
  mongo_data:
  minio_data:
  pgadmin_data:
